<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Finance Dashboard — Career Solutions for Today</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tell search engines the canonical home is the GitHub Pages app -->
  <link rel="canonical" href="https://stevenmkay.github.io/Finance-Dashboard/" />
  <meta name="robots" content="noindex,follow" />

  <!-- Belt: server/browser-honored redirect (kicks in immediately) -->
  <meta http-equiv="refresh" content="0; url=https://stevenmkay.github.io/Finance-Dashboard/" />

  <style>
    html, body { margin:0; padding:0; height:100%; background:#0d111d; color:#eaeefc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .wrap { min-height:100%; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:520px; text-align:center; background:#161b2d; border:1px solid #2a3047;
      border-radius:16px; padding:36px 28px; box-shadow:0 18px 48px rgba(0,0,0,.45); }
    h1 { margin:0 0 12px; font-size:22px; letter-spacing:.3px; }
    p  { margin:8px 0 20px; color:#a9b1cc; line-height:1.5; }
    a.btn { display:inline-block; padding:12px 22px; border-radius:10px;
      background:linear-gradient(135deg,#6b5cff,#ff7a3d); color:#fff; text-decoration:none;
      font-weight:600; font-size:15px; }
    a.btn:hover { filter:brightness(1.08); }
    .small { font-size:12px; color:#7a83a3; margin-top:14px; }
    code { background:#0a0e1a; padding:2px 6px; border-radius:6px; font-size:12px; }
  </style>

  <!-- Suspenders: JS replace() so back-button doesn't trap users on this page -->
  <script>
    window.location.replace("https://stevenmkay.github.io/Finance-Dashboard/");
  </script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Redirecting to the Finance Dashboard…</h1>
      <p>The Strategy Lab now lives on its own dedicated host. If your browser
         hasn’t bounced you yet, click the button below.</p>
      <a class="btn" href="https://stevenmkay.github.io/Finance-Dashboard/">
        Open Finance Dashboard
      </a>
      <p class="small">New URL: <code>stevenmkay.github.io/Finance-Dashboard</code></p>
    </div>
  </div>
</body>
</html>
