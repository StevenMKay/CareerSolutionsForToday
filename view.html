<style>
  :root{--c-primary:#005EB8;--page-bg:#F8F9FB;--card-bg:#fff;--heading-color:#0A2F6B;--text-color:#374151;--muted-color:#4B5563;--border-color:#E5E7EB}
  body{font-family:'Manrope',sans-serif;margin:0;background:var(--page-bg);color:#0A0A0A}
  h1,h2,h3,h4,h5,h6{font-family:'Outfit',sans-serif}
  .fade-in{animation:fadeIn 0.5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Full-width hero */
  .hero-full{width:100%;padding:2.5rem 0}

  /* Sidebar nav */
  .sidebar-nav{max-height:calc(100vh - 100px);overflow-y:auto;padding-right:0.5rem}
  .sidebar-nav a{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0.75rem;border-radius:0.375rem;font-size:0.8125rem;font-weight:500;color:var(--muted-color);transition:all 0.15s;text-decoration:none;border-left:2px solid transparent}
  .sidebar-nav a:hover{background:rgba(0,0,0,0.04);color:var(--heading-color)}
  .sidebar-nav a.active{background:color-mix(in srgb,var(--c-primary) 8%,transparent);color:var(--c-primary);border-left-color:var(--c-primary);font-weight:600}

  .section-card{scroll-margin-top:80px}

  /* Mobile sidebar */
  .mobile-nav-btn{display:none}
  @media (max-width:1023px){
    .mobile-nav-btn{display:flex}
    .sidebar-col{display:none}
    .sidebar-col.open{display:block;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.4)}
    .sidebar-col.open .sidebar-inner{transform:translateX(0)}
    .sidebar-inner{position:fixed;left:0;top:0;bottom:0;width:280px;background:var(--card-bg);padding:1.5rem;z-index:41;transform:translateX(-100%);transition:transform 0.3s ease;overflow-y:auto;box-shadow:4px 0 24px rgba(0,0,0,0.1)}
  }
  @media (min-width:1024px){
    .sidebar-inner{position:static;transform:none!important;box-shadow:none;padding:0;background:transparent}
  }
  @media print{body{background:#fff!important;padding:0}.no-print{display:none!important}.section-card{break-inside:avoid}#print-modal{display:none!important}}

  /* PATCH (Plan polish v2): premium divider between Plan and Resume on the
     published page. Self-contained CSS so view.html doesn't depend on
     resumebuilder.html. Only rendered when both Plan and Resume sections
     are present (see splice in renderPlan). */
  .package-section-divider{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:18px;
    max-width:980px;margin:42px auto;padding:0 16px;
  }
  .package-divider-line{height:1px;background:linear-gradient(90deg,transparent,rgba(11,72,122,0.35),transparent)}
  .package-divider-card{
    min-width:220px;text-align:center;padding:14px 18px;border-radius:999px;
    background:#ffffff;border:1px solid rgba(15,23,42,0.10);
    box-shadow:0 10px 26px rgba(15,23,42,0.08);color:#0f172a;
  }
  .package-divider-card strong{display:block;color:#0b487a;font-size:14px;letter-spacing:.02em}
  .package-divider-card small,
  .package-divider-eyebrow{display:block;color:#64748b;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase}
  @media (max-width:640px){
    .package-section-divider{grid-template-columns:1fr;gap:10px;margin:28px auto}
    .package-divider-line{width:100%}
    .package-divider-card{width:100%;min-width:0;border-radius:16px}
  }
  
  /* Photo shape support */
  .photo-shape-circle{border-radius:50%}
  .photo-shape-rounded-square{border-radius:1rem}
  .photo-shape-square{border-radius:0.5rem}
  .photo-shape-shield{border-radius:50% 50% 50% 50% / 40% 40% 60% 60%}
  .photo-shape-hexagon{clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
  
  /* Mobile responsive */
  @media (max-width:639px) {
    .hero-full{padding:1rem 0}
    .hero-full h1{font-size:1.5rem!important}
    .hero-full .grid{grid-template-columns:1fr!important}
    .hero-full .flex-row{flex-direction:column!important;text-align:center}
    .section-card{padding:1rem!important}
  }

</header>

<!-- Loading -->

</div>

<!-- Not found -->
<div id="not-found" class="hidden max-w-md mx-auto px-4 py-20 text-center" data-testid="not-found">
  <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:0.75rem;padding:1.5rem">

    <p class="text-sm mt-2 mb-4" style="color:var(--muted-color)">This plan may have been removed or the link is incorrect.</p>
    <a href="builder.html" class="inline-flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg text-white" style="background:var(--c-primary)">Create Your Own Plan</a>

<!-- Main content wrapper (hidden until loaded) -->

          <nav class="sidebar-nav space-y-1" id="sidebar-nav" data-testid="sidebar-nav"></nav>
        </div>
      </div>
      <!-- Main sections -->

    </div>
  </div>
</div>

  <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
    <p class="text-xs" style="color:#9CA3AF">Built with <a href="builder.html" class="underline hover:opacity-80" style="color:var(--c-primary)">Career Solutions for Today</a></p>

        <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:var(--c-primary,#005EB8)10"><i data-lucide="file-text" style="width:18px;height:18px;color:var(--c-primary,#005EB8)"></i></div>
        <div>
          <p class="text-sm font-semibold" style="color:var(--heading-color,#0A2F6B)">Full Document</p>

/* KEEP IN SYNC with builder.html STYLE_CONFIG */
const STYLE_CONFIG = {
  executive: {
    name: 'Executive', layout: 'sidebar', pageBg: '#F8F9FB',
    cardBg: '#fff', cardBorder: '#E5E7EB',
    headingFont: "'Georgia', serif", bodyFont: "'Manrope', sans-serif",

  },

  },

    borderStyle: '1px solid #334155', dividerStyle: '1px solid #334155',
    skillCols: 4, kpiCols: 4, accentOverride: '#22D3EE',
  },
};

function toggleSidebar() {
  document.getElementById('sidebar-col').classList.toggle('open');
}
document.getElementById('sidebar-col').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

async function loadPlan() {
  const slug = new URLSearchParams(window.location.search).get('p');
  if (!slug) { document.getElementById('loading').classList.add('hidden'); document.getElementById('not-found').classList.remove('hidden'); return; }
  try {
    const snap = await db.collection('plans').where('slug','==',slug).where('published','==',true).limit(1).get();
    if (snap.empty) { document.getElementById('loading').classList.add('hidden'); document.getElementById('not-found').classList.remove('hidden'); return; }
    const plan = snap.docs[0].data();
    // Check if publish link has expired (free trial / $1 users get 24hr links)
    if (plan.publishExpiresAt && new Date(plan.publishExpiresAt) < new Date()) {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('not-found').classList.remove('hidden');
      const nf = document.getElementById('not-found');
      if (nf) nf.innerHTML = '<div style="text-align:center;padding:3rem 1.5rem"><h2 style="font-size:1.5rem;font-weight:700;color:#0A2F6B;margin-bottom:0.5rem">Link Expired</h2><p style="color:#6B7280">This shared link has expired. The owner can re-publish or upgrade for permanent links.</p></div>';
      return;
    }
    const g = plan.generated || {};
    const style = plan.style || 'executive';
    const S = STYLE_CONFIG[style] || STYLE_CONFIG.executive;
    const C = S.accentOverride || plan.color || '#005EB8';
    // Apply theme CSS variables
    document.documentElement.style.setProperty('--c-primary', C);
    document.documentElement.style.setProperty('--page-bg', S.pageBg);
    document.documentElement.style.setProperty('--card-bg', S.cardBg);
    document.documentElement.style.setProperty('--heading-color', S.headingColor);
    document.documentElement.style.setProperty('--text-color', S.textColor);
    document.documentElement.style.setProperty('--muted-color', S.mutedColor);
    document.documentElement.style.setProperty('--border-color', S.cardBorder || '#E5E7EB');
    document.body.style.background = S.pageBg;
    // Set meta
    const name = g.hero?.name || plan.userName || 'Plan';
    const title = g.hero?.target_title || plan.jobTitle || '';
    const company = g.hero?.company || plan.company || '';
    document.title = name + ' — ' + title + (company ? ' at ' + company : '');
    document.querySelector('meta[property="og:title"]').content = document.title;
    const desc = g.executive_summary ? g.executive_summary.substring(0, 160) : name + "'s " + (plan.planType || '90-day') + ' plan for ' + title;
    document.querySelector('meta[name="description"]').content = desc;
    document.querySelector('meta[property="og:description"]').content = desc;
    // Header theme for dark themes
    if (style === 'tech') {
      document.querySelector('header').style.background = '#1E293B';
      document.querySelector('header').style.borderColor = '#334155';
      document.querySelector('footer').style.background = '#0F172A';
      document.querySelector('footer').style.borderColor = '#334155';
    }
    renderPlan(g, plan, S, C, style);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('plan-content').classList.remove('hidden');
    document.getElementById('plan-footer').classList.remove('hidden');
    setupScrollSpy();
  } catch(e) {
    console.error(e);
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('not-found').classList.remove('hidden');
  }
  lucide.createIcons();
}

function renderPlan(g, plan, S, C, style) {
  const light = C + '18';
  const lighter = C + '10';
  const sections = []; // collect for sidebar nav

  // Helper: section label
  function sectionLabel(icon, text) {
    if (S.sectionLabelStyle === 'terminal') {
      return `<div class="flex items-center gap-2 mb-4"><span style="color:${C};font-family:${S.headingFont};font-size:0.8rem;font-weight:700">&gt; ${text.toUpperCase()}</span></div>`;
    }
    if (S.sectionLabelStyle === 'classic') {
      return `<div class="mb-4" style="border-bottom:${S.dividerStyle};padding-bottom:0.5rem"><div class="flex items-center gap-2"><i data-lucide="${icon}" style="width:16px;height:16px;color:${C}"></i><p style="font-family:${S.headingFont};font-size:0.9rem;font-weight:600;color:${S.headingColor};letter-spacing:0.05em">${text}</p></div></div>`;
    }
    if (S.sectionLabelStyle === 'minimal') {
      return `<div class="flex items-center gap-2 mb-4"><p style="font-family:${S.headingFont};font-size:0.7rem;font-weight:600;color:${S.mutedColor};letter-spacing:0.15em;text-transform:uppercase">${text}</p></div>`;
    }
    if (S.sectionLabelStyle === 'bold') {
      return `<div class="flex items-center gap-2 mb-4"><div style="width:4px;height:24px;background:${C};border-radius:2px"></div><p style="font-family:${S.headingFont};font-size:0.85rem;font-weight:700;color:${S.headingColor};text-transform:uppercase;letter-spacing:0.1em">${text}</p></div>`;
    }
    return `<div class="flex items-center gap-2 mb-3"><i data-lucide="${icon}" style="width:16px;height:16px;color:${C}"></i><p class="text-xs font-bold uppercase tracking-wider" style="color:${C};letter-spacing:0.2em">${text}</p></div>`;
  }

  // Helper: card wrapper
  function card(content, extra) {
    return `<div style="background:${S.cardBg};border:${S.borderStyle};border-radius:${S.cardRadius};padding:1.5rem;box-shadow:${S.cardShadow};font-family:${S.bodyFont};${extra || ''}">${content}</div>`;
  }

  // Contact bar
  function contactBar(accentColor) {
    const ac = accentColor || C;
    let items = '';
    const phone = plan.contactPhone || '';
    const email = plan.contactEmail || '';
    const linkedin = plan.contactLinkedin || '';
    const github = plan.contactGithub || '';
    const website = plan.contactWebsite || '';
    const twitter = plan.contactTwitter || '';
    if (phone) items += `<a href="tel:${phone}" class="flex items-center gap-1.5 hover:opacity-80" style="color:inherit;text-decoration:none"><i data-lucide="phone" style="width:14px;height:14px;color:${ac}"></i>${phone}</a>`;
    if (email) items += `<a href="mailto:${email}" class="flex items-center gap-1.5 hover:opacity-80" style="color:inherit;text-decoration:none"><i data-lucide="mail" style="width:14px;height:14px;color:${ac}"></i>${email}</a>`;
    if (linkedin) items += `<a href="${linkedin.startsWith('http') ? linkedin : 'https://' + linkedin}" target="_blank" class="flex items-center gap-1.5 hover:underline" style="color:inherit;text-decoration:none"><img src="https://raw.githubusercontent.com/StevenMKay/CareerSolutionsForToday/0a01a653a891ffe30d4da303a139dc3336cedcb5/icons/LinkedInIcon.png" alt="LinkedIn" style="width:14px;height:14px">LinkedIn</a>`;
    if (github) items += `<a href="${github.startsWith('http') ? github : 'https://' + github}" target="_blank" class="flex items-center gap-1.5 hover:underline" style="color:inherit;text-decoration:none"><i data-lucide="github" style="width:14px;height:14px;color:${ac}"></i>GitHub</a>`;

  if (g.hero) {
    const footerBg = S.layout === 'sidebar' ? S.sidebarBg : (style === 'tech' ? '#0F172A' : S.headingColor);
    contentHtml += `<div style="background:${footerBg};border-radius:${S.cardRadius};padding:1rem 1.5rem;text-align:center"><p class="text-xs" style="color:rgba(255,255,255,0.7)">${g.hero.name || ''} &bull; ${g.hero.target_title || ''} ${g.hero.company ? '&bull; ' + g.hero.company : ''}</p></div>`;
  }

  document.getElementById('sections-container').innerHTML = contentHtml;
}

function closeSidebarMobile() {
  document.getElementById('sidebar-col').classList.remove('open');
}

// PATCH (Plan polish v2): self-contained Plan->Resume divider helper for
// the published page. Mirrors window.renderPackageSectionDivider in
// resumebuilder.html so view.html stays standalone.
function renderPackageSectionDivider(fromLabel, toLabel) {
  fromLabel = fromLabel || 'Career Plan';
  toLabel   = toLabel   || 'Resume';
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  return ''
    + '<div class="package-section-divider" role="separator" aria-label="' + esc(fromLabel) + ' to ' + esc(toLabel) + '">'
    +   '<div class="package-divider-line"></div>'
    +   '<div class="package-divider-card">'
    +     '<span class="package-divider-eyebrow">Next Section</span>'
    +     '<strong>' + esc(toLabel) + '</strong>'
    +     '<small>' + esc(fromLabel) + ' complete</small>'
    +   '</div>'
    +   '<div class="package-divider-line"></div>'
    + '</div>';
}

function setupScrollSpy() {
  const navLinks = document.querySelectorAll('#sidebar-nav a');
  const sectionEls = document.querySelectorAll('.section-card[id]');
  if (!sectionEls.length) return;
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(a => a.classList.remove('active'));
        const active = document.querySelector(`#sidebar-nav a[data-section="${entry.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });
  sectionEls.forEach(el => observer.observe(el));
  if (navLinks.length) navLinks[0].classList.add('active');
}

// ===== Print Modal =====
function openPrintModal() {
  document.getElementById('print-modal').classList.remove('hidden');
  lucide.createIcons();
}
function closePrintModal() {
  document.getElementById('print-modal').classList.add('hidden');
}
function printAll() {
  closePrintModal();
  // Show everything
  document.querySelectorAll('.section-card').forEach(el => el.style.display = '');
  document.getElementById('hero-section').style.display = '';
  setTimeout(() => window.print(), 100);
}
function printResume() {
  closePrintModal();
  const resumeSections = ['experience', 'skills', 'education', 'certifications', 'achievements', 'leadership-roles'];
  document.querySelectorAll('.section-card').forEach(el => {
    if (resumeSections.includes(el.id)) {
      el.style.display = '';
    } else {
      el.setAttribute('data-was-visible', el.style.display || '');
      el.style.display = 'none';
    }
  });
  // Keep hero visible for contact info
  document.getElementById('hero-section').style.display = '';
  window.print();
  // Restore after printing
  setTimeout(() => {
    document.querySelectorAll('.section-card').forEach(el => {
      if (el.hasAttribute('data-was-visible')) {
        el.style.display = el.getAttribute('data-was-visible');
        el.removeAttribute('data-was-visible');
      }
    });
  }, 500);
}

loadPlan();
lucide.createIcons();
