<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Resume Builder | Career Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F172A" />
  <link rel="stylesheet" href="./styles.css" />
  <script>
    // Apply WebView body class early so CSS doesn't flash. Detection logic also lives in app.js.
    (function () {
      try {
        var inApp = !!window.ReactNativeWebView ||
          /CareerResumeBuilder/i.test(navigator.userAgent || '');
        if (inApp) document.documentElement.classList.add('in-app');
      } catch (_) {}
    })();
  </script>
</head>
<body>
  <header class="app-header">
    <h1 class="app-header__title">Resume Portfolio</h1>
    <button id="btn-my-resumes" class="app-header__action" type="button">My Resumes</button>
  </header>

  <main id="app">
    <nav class="step-nav" aria-label="Workflow steps">
      <button type="button" class="step-nav__btn" data-step="1">Build</button>
      <button type="button" class="step-nav__btn" data-step="2">Optimize</button>
      <button type="button" class="step-nav__btn" data-step="3">Style</button>
      <button type="button" class="step-nav__btn" data-step="4">Preview</button>
    </nav>

    <section id="step-1" class="step" aria-labelledby="step-1-heading">
      <h2 id="step-1-heading">Build / Edit</h2>
      <div id="workspace-editor" class="step__mount">
        <div class="card card--placeholder">Workspace editor will load here.</div>
      </div>
    </section>

    <section id="step-2" class="step hidden" aria-labelledby="step-2-heading">
      <h2 id="step-2-heading">Optimize</h2>
      <div id="optimize-mount" class="step__mount">
        <div class="card card--placeholder">Optimize controls will load here.</div>
      </div>
    </section>

    <section id="step-3" class="step hidden" aria-labelledby="step-3-heading">
      <h2 id="step-3-heading">Style</h2>
      <div id="style-mount" class="step__mount">
        <div class="card card--placeholder">Style options will load here.</div>
      </div>
    </section>

    <section id="step-4" class="step hidden" aria-labelledby="step-4-heading">
      <h2 id="step-4-heading">Preview</h2>
      <div id="preview-mount" class="step__mount preview-container"></div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
